<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<title>Programming Difficulty</title>

<style>

body{
background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
font-family:Arial;
color:white;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
color:#ffb347;
}

.skill{
margin:20px 0;
}

.title{
display:flex;
justify-content:space-between;
margin-bottom:6px;
font-size:18px;
}

.bar{
width:100%;
height:25px;
background:#333;
border-radius:30px;
overflow:hidden;
box-shadow:0 0 10px #000 inset;
}

.fill{
height:100%;
width:0%;
border-radius:30px;
background:linear-gradient(90deg,#ff7b00,#ffb347);
transition:width 3s;
}

</style>
</head>

<body>

<h1></h1>

<div class="skill">
<div class="title">HTML & CSS <span id="t1">0%</span></div>
<div class="bar"><div class="fill" id="s1"></div></div>
</div>

<div class="skill">
<div class="title">JavaScript <span id="t2">0%</span></div>
<div class="bar"><div class="fill" id="s2"></div></div>
</div>

<div class="skill">
<div class="title">Python <span id="t3">0%</span></div>
<div class="bar"><div class="fill" id="s3"></div></div>
</div>

<div class="skill">
<div class="title">Java <span id="t4">0%</span></div>
<div class="bar"><div class="fill" id="s4"></div></div>
</div>

<div class="skill">
<div class="title">C++ <span id="t5">0%</span></div>
<div class="bar"><div class="fill" id="s5"></div></div>
</div>

<div class="skill">
<div class="title">C# <span id="t6">0%</span></div>
<div class="bar"><div class="fill" id="s6"></div></div>
</div>

<div class="skill">
<div class="title">PHP <span id="t7">0%</span></div>
<div class="bar"><div class="fill" id="s7"></div></div>
</div>



<script>

function animate(bar,text,value,delay){

setTimeout(()=>{

let i=0
let interval=setInterval(()=>{

i++
document.getElementById(bar).style.width=i+"%"
document.getElementById(text).innerText=i+"%"

if(i>=value){
clearInterval(interval)
}

},30)

},delay)

}

animate("s1","t1",25,500)
animate("s2","t2",52,1000)
animate("s3","t3",45,1500)
animate("s4","t4",73,2000)
animate("s5","t5",85,2500)
animate("s6","t6",52,3000)
animate("s7","t7",45,3500)

</script>

</body>
</html>
